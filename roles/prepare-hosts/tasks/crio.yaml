# ============================================================
# Online — настройка репозиториев и установка
# ============================================================

- name: Add CRI-O repository Ubuntu key
  when:
    - ansible_facts['os_family'] == "Debian"
    - k8s_install_mode == "online"
  ansible.builtin.apt_key:
    url: "https://download.opensuse.org/repositories/isv:/cri-o:/{{ stage }}:/{{ crio_version }}/deb/Release.key"
    state: present
    keyring: /etc/apt/trusted.gpg.d/crio.gpg

- name: Add CRI-O repository Ubuntu
  when:
    - ansible_facts['os_family'] == "Debian"
    - k8s_install_mode == "online"
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/trusted.gpg.d/crio.gpg] https://download.opensuse.org/repositories/isv:/cri-o:/{{ stage }}:/{{ crio_version }}/deb/ /"
    state: present
    filename: "cri-o"
    update_cache: true

- name: Add CRI-O repository RedHat
  when:
    - ansible_facts['os_family'] == "RedHat"
    - k8s_install_mode == "online"
  ansible.builtin.yum_repository:
    name: cri-o
    description: CRI-O repository for version {{ crio_version }}
    baseurl: https://download.opensuse.org/repositories/isv:/cri-o:/{{ stage }}:/{{ crio_version }}/rpm/
    gpgcheck: true
    enabled: true
    gpgkey:
      - https://download.opensuse.org/repositories/isv:/cri-o:/{{ stage }}:/{{ crio_version }}/rpm/repodata/repomd.xml.key
    state: present

- name: Install CRI-O [rpm, online]
  when:
    - ansible_facts['os_family'] == "RedHat"
    - k8s_install_mode == "online"
  ansible.builtin.dnf:
    name:
      - cri-o
    state: present

- name: Install CRI-O [deb, online]
  when:
    - ansible_facts['os_family'] == "Debian"
    - k8s_install_mode == "online"
  ansible.builtin.apt:
    name:
      - cri-o
    state: present

# ============================================================
# Offline — установка из локальных пакетов
# ============================================================

- name: Скопировать пакеты CRI-O [offline]
  when: k8s_install_mode == "offline"
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ k8s_packages_remote_dir }}/"
    mode: "0644"
  with_fileglob:
    - "{{ playbook_dir }}/{{ k8s_offline_dir }}/cri/crio/*.rpm"
    - "{{ playbook_dir }}/{{ k8s_offline_dir }}/cri/crio/*.deb"

- name: Установить CRI-O из RPM [RedHat, offline]
  when:
    - ansible_facts['os_family'] == "RedHat"
    - k8s_install_mode == "offline"
  ansible.builtin.shell: >
    dnf install -y {{ k8s_packages_remote_dir }}/cri-o*.rpm
  args:
    warn: false

- name: Установить CRI-O из DEB [Debian, offline]
  when:
    - ansible_facts['os_family'] == "Debian"
    - k8s_install_mode == "offline"
  ansible.builtin.shell: >
    dpkg -i {{ k8s_packages_remote_dir }}/cri-o*.deb
  args:
    warn: false

- name: CRI-O /etc/cni/net.d [del dir]
  ansible.builtin.file:
    path: /etc/cni/net.d
    state: absent

- name: CRI-O /etc/cni/net.d [create dir]
  ansible.builtin.file:
    path: /etc/cni/net.d
    state: directory

- name: CRI-O add cgroups V2 and pause image
  ansible.builtin.template:
    src: crio-02-conf.j2
    dest: /etc/crio/crio.conf.d/20-custom.conf
    mode: "0600"
    owner: root

# https://github.com/containers/image/blob/main/docs/containers-registries.conf.5.md
- name: Directory /etc/containers/registries.conf.d/
  ansible.builtin.file:
    path: /etc/containers/registries.conf.d/
    state: directory

- name: Enable dockerhub mirror on CRI-O
  when: dockerhubMirror
  ansible.builtin.template:
    src: cri-o-mirrors.j2
    dest: /etc/containers/registries.conf.d/registries.conf
    owner: root
    mode: u=rw,g=r,o=r

- name: Enable and start CRI-O service
  ansible.builtin.service:
    name: crio
    state: restarted
    enabled: true
