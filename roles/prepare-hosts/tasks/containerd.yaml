# ============================================================
# Online — настройка репозиториев и установка
# ============================================================

- name: Docker repository for containerd RedHat
  when:
    - ansible_facts['os_family'] == "RedHat"
    - k8s_install_mode == "online"
  ansible.builtin.yum_repository:
    name: docker-ce-stable
    enabled: true
    baseurl: "https://download.docker.com/linux/centos/$releasever/$basearch/stable"
    description: 'Docker CE Stable - $basearch'
    gpgcheck: true
    gpgkey:
      - 'https://download.docker.com/linux/centos/gpg'

- name: Docker repository for Ubuntu [Key]
  when:
    - ansible_facts['os_family'] == "Debian"
    - k8s_install_mode == "online"
  ansible.builtin.apt_key:
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    state: present
    keyring: /etc/apt/trusted.gpg.d/docker.gpg

- name: Docker repository for Ubuntu
  when:
    - ansible_facts['os_family'] == "Debian"
    - ansible_facts['distribution'] == "Ubuntu"
    - k8s_install_mode == "online"
  ansible.builtin.apt_repository:
    repo: >
      deb [signed-by=/etc/apt/trusted.gpg.d/docker.gpg]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} stable"
    state: present
    filename: docker-ce-stable

- name: Install containerd [rpm, online]
  when:
    - ansible_facts['os_family'] == "RedHat"
    - k8s_install_mode == "online"
  ansible.builtin.dnf:
    name:
      - containerd
    state: present

- name: Install containerd [deb, online]
  when:
    - ansible_facts['os_family'] == "Debian"
    - k8s_install_mode == "online"
  ansible.builtin.apt:
    name:
      - containerd
    state: present

# ============================================================
# Offline — установка из локальных пакетов
# ============================================================

- name: Скопировать пакеты containerd [offline]
  when: k8s_install_mode == "offline"
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ k8s_packages_remote_dir }}/"
    mode: "0644"
  with_fileglob:
    - "{{ playbook_dir }}/{{ k8s_offline_dir }}/cri/containerd/*.rpm"
    - "{{ playbook_dir }}/{{ k8s_offline_dir }}/cri/containerd/*.deb"

- name: Установить containerd из RPM [RedHat, offline]
  when:
    - ansible_facts['os_family'] == "RedHat"
    - k8s_install_mode == "offline"
  ansible.builtin.shell: >
    dnf install -y {{ k8s_packages_remote_dir }}/containerd*.rpm
  args:
    warn: false

- name: Установить containerd из DEB [Debian, offline]
  when:
    - ansible_facts['os_family'] == "Debian"
    - k8s_install_mode == "offline"
  ansible.builtin.shell: >
    dpkg -i {{ k8s_packages_remote_dir }}/containerd*.deb
  args:
    warn: false

- name: Enable dockerhub mirror on containerd [mkdir certs.d]
  ansible.builtin.file:
    path: /etc/containerd/certs.d
    state: directory
    mode: u=rw,g=r,o=r

- name: Enable dockerhub mirror on containerd [mkdir docker.io]
  when: dockerhubMirror is true
  ansible.builtin.file:
    path: /etc/containerd/certs.d/docker.io
    state: directory
    mode: u=rw,g=r,o=r

- name: Enable dockerhub mirror on containerd [file hosts.toml]
  when: dockerhubMirror is true
  ansible.builtin.template:
    src: hosts.j2
    dest: /etc/containerd/certs.d/docker.io/hosts.toml
    owner: root
    mode: u=rw,g=r,o=r

- name: Создать containerd config.toml
  ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
  changed_when: true

- name: Включить cgroup v2 [config.toml]
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^\s*SystemdCgroup = false'
    line: '    SystemdCgroup = true'

- name: Включить каталог сертификов [config.toml]
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^\s*config_path = ""'
    line: '    config_path = "/etc/containerd/certs.d"'

- name: Настроить sandbox image [config.toml]
  when: sandbox_image is defined
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^\s*sandbox_image = ".*"'
    line: '    sandbox_image = "{{ sandbox_image }}"'

- name: Enable and start Containerd service
  ansible.builtin.service:
    name: containerd
    state: restarted
    enabled: true
