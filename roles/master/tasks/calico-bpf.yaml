---
# Инициализация первой control plane ноды с Calico + eBPF

- name: Инициализация master ноды с eBPF
  ansible.builtin.shell: kubeadm init --config /etc/kubernetes/kubeadm-config.yaml --skip-phases=addon/kube-proxy
  register: kubeadm_init

- name: Установить утилиты
  ansible.builtin.include_tasks: utils.yaml

- name: Скопировать kubernetes-services-endpoint.yaml
  ansible.builtin.template:
    src: kubernetes-services-endpoint.j2
    dest: /etc/kubernetes/kubernetes-services-endpoint.yaml

- name: Создать ConfigMap kubernetes-services-endpoint
  ansible.builtin.shell: kubectl apply -f /etc/kubernetes/kubernetes-services-endpoint.yaml

- name: Скопировать calico.yaml
  ansible.builtin.template:
    src: calico.j2
    dest: /etc/kubernetes/calico-bpf.yaml

- name: Установить Calico BPF
  ansible.builtin.shell: kubectl apply -f /etc/kubernetes/calico-bpf.yaml

- name: Скопировать FelixConfiguration
  ansible.builtin.template:
    src: felix-configuration.j2
    dest: /etc/kubernetes/felix-configuration.yaml

- name: Применить FelixConfiguration
  ansible.builtin.shell: calicoctl apply -f /etc/kubernetes/felix-configuration.yaml
