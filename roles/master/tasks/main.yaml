---
# Первая (primary) control plane нода

- name: Проверить, кластер уже инициализирован
  ansible.builtin.stat:
    path: "/etc/kubernetes/pki/ca.key"
  register: kubeadm_ca

- name: Инициализация первого master
  when: not kubeadm_ca.stat.exists
  block:
    - name: Создать каталог /etc/kubernetes
      ansible.builtin.file:
        path: /etc/kubernetes
        state: directory
        mode: '0700'

    - name: Определить среднюю версию k8s
      ansible.builtin.set_fact:
        k8s_middle_version: "{{ kube_version[2:4] | int }}"

    # Выбор шаблона kubeadm-config в зависимости от режима etcd
    - name: Скопировать kubeadm-config.yaml (external etcd)
      ansible.builtin.template:
        src: kubeadm-config-external-etcd.j2
        dest: /etc/kubernetes/kubeadm-config.yaml
        mode: '0600'
      when: etcd_mode is defined and etcd_mode == "external"

    - name: Скопировать kubeadm-config.yaml (stacked etcd)
      ansible.builtin.template:
        src: kubeadm-config.j2
        dest: /etc/kubernetes/kubeadm-config.yaml
        mode: '0600'
      when: etcd_mode is not defined or etcd_mode == "stacked"

    # При offline-режиме образы загружаются из tar-файла, а не из сети
    - name: Загрузить образы k8s из архива [offline]
      when: k8s_install_mode == "offline"
      ansible.builtin.shell: |
        ctr -n k8s.io images import {{ k8s_packages_remote_dir }}/k8s-images.tar
      args:
        warn: false

    # При external etcd не нужно загружать образ etcd — тянем только необходимые образы
    - name: Загрузить образы k8s (external etcd — без etcd) [online]
      when:
        - etcd_mode is defined and etcd_mode == "external"
        - k8s_install_mode == "online"
      ansible.builtin.shell: |
        kubeadm config images list --kubernetes-version {{ kube_version }} | grep -v etcd | xargs -I{} ctr image pull {}

    - name: Загрузить образы k8s (stacked etcd) [online]
      when:
        - etcd_mode is not defined or etcd_mode == "stacked"
        - k8s_install_mode == "online"
      ansible.builtin.command: kubeadm config images pull

    - name: Calico
      when: cni == 'calico'
      block:

      - name: Установить Calico
        when: enableBPF is not defined
        ansible.builtin.include_tasks: calico.yaml

      - name: Установить Calico с BPF
        when: enableBPF is defined
        ansible.builtin.include_tasks: calico-bpf.yaml

    - name: Flannel
      when: cni == 'flannel'
      ansible.builtin.include_tasks: flannel.yaml

    - name: Настроить DNS
      ansible.builtin.include_tasks: dns.yaml

    # Почему-то в 1.25 на AlmaLinux 8 не ставится enabled автоматически
    - name: Включить kubelet
      ansible.builtin.service:
        name: kubelet
        state: started
        enabled: true
