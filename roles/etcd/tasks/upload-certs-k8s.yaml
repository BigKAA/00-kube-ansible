---
# Загрузка клиентских сертификатов на k8s control plane ноды
# На каждую master ноду загружаются:
#   - etcd CA: etcd-ca.crt → /etc/kubernetes/pki/etcd/ca.crt
#   - apiserver client cert: apiserver-etcd-client.crt → /etc/kubernetes/pki/apiserver-etcd-client.crt
#   - apiserver client key: apiserver-etcd-client.key → /etc/kubernetes/pki/apiserver-etcd-client.key
#
# Переменная цикла: _k8s_master (inventory hostname из groups['k8s_masters'])

- name: Создать каталог /etc/kubernetes/pki/etcd
  ansible.builtin.file:
    path: /etc/kubernetes/pki/etcd
    state: directory
    mode: '0755'
    owner: root
    group: root
  delegate_to: "{{ _k8s_master }}"

- name: Загрузить etcd CA в /etc/kubernetes/pki/etcd/
  ansible.builtin.copy:
    src: "{{ etcd_local_pki_dir }}/{{ etcd_ca_crt }}"
    dest: /etc/kubernetes/pki/etcd/ca.crt
    mode: '0644'
    owner: root
    group: root
  delegate_to: "{{ _k8s_master }}"

- name: Загрузить apiserver-etcd-client сертификат
  ansible.builtin.copy:
    src: "{{ etcd_local_pki_dir }}/apiserver-etcd-client.crt"
    dest: /etc/kubernetes/pki/apiserver-etcd-client.crt
    mode: '0644'
    owner: root
    group: root
  delegate_to: "{{ _k8s_master }}"

- name: Загрузить apiserver-etcd-client ключ
  ansible.builtin.copy:
    src: "{{ etcd_local_pki_dir }}/apiserver-etcd-client.key"
    dest: /etc/kubernetes/pki/apiserver-etcd-client.key
    mode: '0600'
    owner: root
    group: root
  delegate_to: "{{ _k8s_master }}"
