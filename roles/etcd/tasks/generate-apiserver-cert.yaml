---
# Генерация клиентского сертификата kube-apiserver → etcd (community.crypto, на localhost)
# Создаёт файлы: apiserver-etcd-client.crt, apiserver-etcd-client.key

- name: apiserver-etcd-client — генерация закрытого ключа
  community.crypto.openssl_privatekey:
    path: "{{ etcd_local_pki_dir }}/apiserver-etcd-client.key"
    type: RSA
    size: "{{ etcd_key_size }}"
    mode: "0600"
  delegate_to: localhost
  become: false
  run_once: true

- name: apiserver-etcd-client — генерация CSR
  community.crypto.openssl_csr:
    path: "{{ etcd_local_pki_dir }}/apiserver-etcd-client.csr"
    privatekey_path: "{{ etcd_local_pki_dir }}/apiserver-etcd-client.key"
    common_name: "{{ etcd_apiserver_cn }}"
    organization_name: "{{ etcd_apiserver_org }}"
    key_usage:
      - keyEncipherment
      - dataEncipherment
      - digitalSignature
    extended_key_usage:
      - clientAuth
  delegate_to: localhost
  become: false
  run_once: true

- name: apiserver-etcd-client — подпись сертификата CA
  community.crypto.x509_certificate:
    path: "{{ etcd_local_pki_dir }}/apiserver-etcd-client.crt"
    csr_path: "{{ etcd_local_pki_dir }}/apiserver-etcd-client.csr"
    ownca_path: "{{ etcd_local_pki_dir }}/{{ etcd_ca_crt }}"
    ownca_privatekey_path: "{{ etcd_local_pki_dir }}/{{ etcd_ca_key }}"
    provider: ownca
    ownca_not_after: "+{{ etcd_cert_days }}d"
    ownca_digest: sha256
  delegate_to: localhost
  become: false
  run_once: true

- name: apiserver-etcd-client — очистка временных файлов
  ansible.builtin.file:
    path: "{{ etcd_local_pki_dir }}/apiserver-etcd-client.csr"
    state: absent
  delegate_to: localhost
  become: false
  run_once: true

- name: apiserver-etcd-client — установить права
  ansible.builtin.file:
    path: "{{ etcd_local_pki_dir }}/{{ item.path }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "apiserver-etcd-client.key", mode: "0600" }
    - { path: "apiserver-etcd-client.crt", mode: "0644" }
  delegate_to: localhost
  become: false
  run_once: true
