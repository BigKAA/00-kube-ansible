---
# Генерация сертификата для одной etcd ноды (community.crypto)
# Переменные цикла: _etcd_node (inventory hostname из groups['etcd_nodes'])

- name: Установить факты ноды {{ _etcd_node }}
  ansible.builtin.set_fact:
    _node_short_name: "{{ hostvars[_etcd_node].etcd_short_name }}"
    _node_ip: "{{ hostvars[_etcd_node].ansible_host }}"
    _node_fqdn: "{{ _etcd_node }}"
  delegate_to: localhost
  become: false
  run_once: true

- name: "{{ _node_short_name }} — генерация закрытого ключа"
  community.crypto.openssl_privatekey:
    path: "{{ etcd_local_pki_dir }}/{{ _node_short_name }}.key"
    type: RSA
    size: "{{ etcd_key_size }}"
    mode: "0600"
  delegate_to: localhost
  become: false
  run_once: true

- name: "{{ _node_short_name }} — генерация CSR"
  community.crypto.openssl_csr:
    path: "{{ etcd_local_pki_dir }}/{{ _node_short_name }}.csr"
    privatekey_path: "{{ etcd_local_pki_dir }}/{{ _node_short_name }}.key"
    common_name: "{{ _node_fqdn }}"
    subject_alt_name:
      - "DNS:{{ _node_fqdn }}"
      - "DNS:{{ _node_short_name }}"
      - "IP:{{ _node_ip }}"
      - "IP:127.0.0.1"
    key_usage:
      - keyEncipherment
      - dataEncipherment
      - digitalSignature
    extended_key_usage:
      - serverAuth
      - clientAuth
  delegate_to: localhost
  become: false
  run_once: true

- name: "{{ _node_short_name }} — подпись сертификата CA"
  community.crypto.openssl_certificate:
    path: "{{ etcd_local_pki_dir }}/{{ _node_short_name }}.crt"
    csr_path: "{{ etcd_local_pki_dir }}/{{ _node_short_name }}.csr"
    ownca_path: "{{ etcd_local_pki_dir }}/{{ etcd_ca_crt }}"
    ownca_privatekey_path: "{{ etcd_local_pki_dir }}/{{ etcd_ca_key }}"
    provider: ownca
    ownca_not_after: "+{{ etcd_cert_days }}d"
    ownca_digest: sha256
  delegate_to: localhost
  become: false
  run_once: true

- name: "{{ _node_short_name }} — очистка временных файлов"
  ansible.builtin.file:
    path: "{{ etcd_local_pki_dir }}/{{ _node_short_name }}.csr"
    state: absent
  delegate_to: localhost
  become: false
  run_once: true
