---
# Генерация административного сертификата etcdctl (community.crypto, на localhost)
# Создаёт файлы: etcd-admin.crt, etcd-admin.key

- name: etcd-admin — генерация закрытого ключа
  community.crypto.openssl_privatekey:
    path: "{{ etcd_local_pki_dir }}/etcd-admin.key"
    type: RSA
    size: "{{ etcd_key_size }}"
    mode: "0600"
  delegate_to: localhost
  become: false
  run_once: true

- name: etcd-admin — генерация CSR
  community.crypto.openssl_csr:
    path: "{{ etcd_local_pki_dir }}/etcd-admin.csr"
    privatekey_path: "{{ etcd_local_pki_dir }}/etcd-admin.key"
    common_name: "{{ etcd_admin_cn }}"
    organization_name: "{{ etcd_admin_org }}"
    key_usage:
      - keyEncipherment
      - dataEncipherment
      - digitalSignature
    extended_key_usage:
      - clientAuth
  delegate_to: localhost
  become: false
  run_once: true

- name: etcd-admin — подпись сертификата CA
  community.crypto.x509_certificate:
    path: "{{ etcd_local_pki_dir }}/etcd-admin.crt"
    csr_path: "{{ etcd_local_pki_dir }}/etcd-admin.csr"
    ownca_path: "{{ etcd_local_pki_dir }}/{{ etcd_ca_crt }}"
    ownca_privatekey_path: "{{ etcd_local_pki_dir }}/{{ etcd_ca_key }}"
    provider: ownca
    ownca_not_after: "+{{ etcd_cert_days }}d"
    ownca_digest: sha256
  delegate_to: localhost
  become: false
  run_once: true

- name: etcd-admin — очистка временных файлов
  ansible.builtin.file:
    path: "{{ etcd_local_pki_dir }}/etcd-admin.csr"
    state: absent
  delegate_to: localhost
  become: false
  run_once: true

- name: etcd-admin — установить права
  ansible.builtin.file:
    path: "{{ etcd_local_pki_dir }}/{{ item.path }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "etcd-admin.key", mode: "0600" }
    - { path: "etcd-admin.crt", mode: "0644" }
  delegate_to: localhost
  become: false
  run_once: true
