### Helm
- name: Установить Helm [online]
  when: k8s_install_mode == "online"
  ansible.builtin.unarchive:
      src: "https://get.helm.sh/helm-{{ helmVersion }}-linux-amd64.tar.gz"
      dest: /root/
      remote_src: true
      creates: /root/linux-amd64/helm
  register: helm_online

- name: Установить Helm [offline]
  when: k8s_install_mode == "offline"
  ansible.builtin.unarchive:
      src: "{{ playbook_dir }}/{{ k8s_offline_dir }}/utils/helm-{{ helmVersion }}-linux-amd64.tar.gz"
      dest: /root/
      creates: /root/linux-amd64/helm
  register: helm_offline

- name: Переместить helm в /usr/local/bin
  ansible.builtin.copy:
      src: /root/linux-amd64/helm
      dest: /usr/local/bin/helm
      remote_src: true
      mode: "0755"
  when: helm_online.changed or helm_offline.changed

- name: Создать symlink helm в /usr/local/sbin (для PATH ansible)
  ansible.builtin.file:
      src: /usr/local/bin/helm
      dest: /usr/local/sbin/helm
      state: link
      force: true
  when: helm_online.changed or helm_offline.changed

- name: Проверить наличие helm-diff
  ansible.builtin.stat:
      path: /root/.local/share/helm/plugins/helm-diff
  register: helm_diff_plugin

- name: Установить плагин helm-diff [online]
  when:
      - not helm_diff_plugin.stat.exists
      - k8s_install_mode == "online"
      - helmDiffEnable | default(true) | bool
  ansible.builtin.shell: "export PATH=$PATH:/usr/local/bin; helm plugin install --verify=false https://github.com/databus23/helm-diff"

- name: Скопировать плагин helm-diff на ноду [offline]
  when:
      - not helm_diff_plugin.stat.exists
      - k8s_install_mode == "offline"
      - helmDiffEnable | default(true) | bool
  ansible.posix.synchronize:
      src: "{{ playbook_dir }}/{{ k8s_offline_dir }}/utils/helm-plugins/helm-diff/"
      dest: /tmp/helm-diff
      delegate_to: localhost
  register: helm_diff_copy

- name: Установить плагин helm-diff [offline]
  when:
      - not helm_diff_plugin.stat.exists
      - k8s_install_mode == "offline"
  ansible.builtin.command: helm plugin install /tmp/helm-diff

- name: Создать каталог для манифестов утилит
  ansible.builtin.file:
      path: /etc/kubernetes/utils
      state: directory
      mode: "0700"

### Priority classes
- name: Скопировать манифест priority classes
  ansible.builtin.copy:
      src: priorityclass.yaml
      dest: /etc/kubernetes/utils/priorityclass.yaml
      mode: "0600"
  register: priority_class

- name: Применить манифест priority classes
  ansible.builtin.command: kubectl apply -f /etc/kubernetes/utils/priorityclass.yaml
  when: priority_class.changed

### Cert-manager (OCI Helm chart)
- name: Установить cert-manager
  when: certManagerEnable
  block:
      - name: Установить cert-manager через OCI [online]
        when: k8s_install_mode == "online"
        kubernetes.core.helm:
            name: cert-manager
            chart_ref: "oci://quay.io/jetstack/charts/cert-manager"
            chart_version: "{{ certManagerVersion }}"
            release_namespace: cert-manager
            create_namespace: true
            values:
                crds:
                    enabled: true
                global:
                    priorityClassName: high-priority
                config:
                    apiVersion: "controller.config.cert-manager.io/v1alpha1"
                    kind: "ControllerConfiguration"
                    enableGatewayAPI: "{{ certManagerEnableGatewayAPI }}"

      - name: Установить cert-manager через OCI [offline]
        when: k8s_install_mode == "offline"
        kubernetes.core.helm:
            name: cert-manager
            chart_ref: "{{ playbook_dir }}/{{ k8s_offline_dir }}/utils/cert-manager-{{ certManagerVersion }}.tgz"
            release_namespace: cert-manager
            create_namespace: true
            values:
                crds:
                    enabled: true
                global:
                    priorityClassName: high-priority
                config:
                    apiVersion: "controller.config.cert-manager.io/v1alpha1"
                    kind: "ControllerConfiguration"
                    enableGatewayAPI: "{{ certManagerEnableGatewayAPI }}"

      - name: Ожидание запуска cert-manager (2 минуты)
        ansible.builtin.wait_for:
            timeout: 120

      - name: Скопировать манифест Issuer
        ansible.builtin.copy:
            src: certs.yaml
            dest: /etc/kubernetes/utils/certs.yaml
            mode: "0600"
        register: issuer

      - name: Применить манифест Issuer
        ansible.builtin.command: kubectl apply -f /etc/kubernetes/utils/certs.yaml
        when: issuer.changed

### Metrics server
- name: Скопировать манифест metrics server
  ansible.builtin.template:
