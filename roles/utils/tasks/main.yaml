### Nfs provisioner (CSI Driver)
- name: Установить NFS CSI Driver
  when: nfsEnable
  block:
      # Проверка наличия предзагруженного chart на control node
      - name: Найти предзагруженный chart NFS CSI Driver
        ansible.builtin.find:
            paths: "{{ playbook_dir }}/../{{ k8s_offline_dir }}/utils/helm-charts"
            patterns: "csi-driver-nfs-*.tgz"
        delegate_to: localhost
        become: false
        run_once: true
        register: _nfs_chart_local

      - name: Скопировать предзагруженный chart на ноду
        ansible.builtin.copy:
            src: "{{ _nfs_chart_local.files[0].path }}"
            dest: "/tmp/csi-driver-nfs-{{ nfsCSIDriverVersion }}.tgz"
            mode: "0644"
        when:
            - k8s_install_mode == "online"
            - _nfs_chart_local.matched | int > 0

      - name: Добавить репозиторий NFS CSI Driver [online]
        when:
            - k8s_install_mode == "online"
            - _nfs_chart_local.matched | int == 0
        kubernetes.core.helm_repository:
            name: csi-driver-nfs
            repo_url: https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/charts

      - name: Установить NFS CSI Driver [online, repo]
        when:
            - k8s_install_mode == "online"
            - _nfs_chart_local.matched | int == 0
        kubernetes.core.helm:
            name: csi-driver-nfs
            chart_ref: csi-driver-nfs/csi-driver-nfs
            chart_version: "{{ nfsCSIDriverVersion }}"
            release_namespace: kube-system
            values:
                controller:
                    runOnControlPlane: true
                    priorityClassName: system-cluster-critical
                storageClass:
                    create: true
                    name: "{{ nfsStorageClassName }}"
                    reclaimPolicy: "{{ nfsReclaimPolicy }}"
                    volumeBindingMode: Immediate
                    parameters:
                        server: "{{ nfsServerHost }}"
                        share: "{{ nfsServerPath }}"
                        archiveOnDelete: "{{ nfsArchiveOnDelete }}"
                    mountOptions: "{{ nfsMountOptions }}"

      - name: Установить NFS CSI Driver [online, local chart]
        when:
            - k8s_install_mode == "online"
            - _nfs_chart_local.matched | int > 0
        kubernetes.core.helm:
            name: csi-driver-nfs
            chart_ref: "/tmp/csi-driver-nfs-{{ nfsCSIDriverVersion }}.tgz"
            release_namespace: kube-system
            values:
                controller:
                    runOnControlPlane: true
                    priorityClassName: system-cluster-critical
                storageClass:
                    create: true
                    name: "{{ nfsStorageClassName }}"
                    reclaimPolicy: "{{ nfsReclaimPolicy }}"
                    volumeBindingMode: Immediate
                    parameters:
                        server: "{{ nfsServerHost }}"
                        share: "{{ nfsServerPath }}"
                        archiveOnDelete: "{{ nfsArchiveOnDelete }}"
                    mountOptions: "{{ nfsMountOptions }}"

      - name: Установить NFS CSI Driver [offline]
        when: k8s_install_mode == "offline"
        kubernetes.core.helm:
            name: csi-driver-nfs
            chart_ref: "{{ playbook_dir }}/../{{ k8s_offline_dir }}/utils/helm-charts/csi-driver-nfs-{{ nfsCSIDriverVersion }}.tgz"
            release_namespace: kube-system
            values:
                controller:
                    runOnControlPlane: true
                    priorityClassName: system-cluster-critical
                storageClass:
                    create: true
                    name: "{{ nfsStorageClassName }}"
                    reclaimPolicy: "{{ nfsReclaimPolicy }}"
                    volumeBindingMode: Immediate
                    parameters:
                        server: "{{ nfsServerHost }}"
                        share: "{{ nfsServerPath }}"
                        archiveOnDelete: "{{ nfsArchiveOnDelete }}"
                    mountOptions: "{{ nfsMountOptions }}"

      - name: Проверить статус NFS CSI Driver
        ansible.builtin.command: kubectl -n kube-system get deployment/csi-nfs-controller -o jsonpath='{.status.readyReplicas}'
        register: nfs_controller_status
        until: nfs_controller_status.stdout | int > 0
        retries: 10
        delay: 10

