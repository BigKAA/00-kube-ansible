### MetalLB
- name: MetalLB
  when: metallbEnable
  block:
      - name: Найти предзагруженный chart MetalLB
        ansible.builtin.find:
            paths: "{{ playbook_dir }}/../{{ k8s_offline_dir }}/utils/helm-charts"
            patterns: "metallb-*.tgz"
        delegate_to: localhost
        become: false
        run_once: true
        register: _metallb_chart_local

      - name: Скопировать предзагруженный chart MetalLB на ноду
        ansible.builtin.copy:
            src: "{{ _metallb_chart_local.files[0].path }}"
            dest: "/tmp/metallb-{{ metallbChartVersion }}.tgz"
            mode: "0644"
        when:
            - k8s_install_mode == "online"
            - _metallb_chart_local.matched | int > 0

      - name: Добавить репозиторий MetalLB [online]
        when:
            - k8s_install_mode == "online"
            - _metallb_chart_local.matched | int == 0
        kubernetes.core.helm_repository:
            name: metallb
            repo_url: https://metallb.github.io/metallb

      - name: Установить Helm-чарт MetalLB [online, repo]
        when:
            - k8s_install_mode == "online"
            - _metallb_chart_local.matched | int == 0
        kubernetes.core.helm:
            name: metallb
            chart_ref: metallb/metallb
            chart_version: "{{ metallbChartVersion }}"
            release_namespace: metallb
            create_namespace: true
            values:
                controller:
                    image:
                        pullPolicy: IfNotPresent
                speaker:
                    image:
                        pullPolicy: IfNotPresent

      - name: Установить Helm-чарт MetalLB [online, local chart]
        when:
            - k8s_install_mode == "online"
            - _metallb_chart_local.matched | int > 0
        kubernetes.core.helm:
            name: metallb
            chart_ref: "/tmp/metallb-{{ metallbChartVersion }}.tgz"
            release_namespace: metallb
            create_namespace: true
            values:
                controller:
                    image:
                        pullPolicy: IfNotPresent
                speaker:
                    image:
                        pullPolicy: IfNotPresent

      - name: Установить Helm-чарт MetalLB [offline]
        when: k8s_install_mode == "offline"
        kubernetes.core.helm:
            name: metallb
            chart_ref: "{{ playbook_dir }}/../{{ k8s_offline_dir }}/utils/helm-charts/metallb-{{ metallbChartVersion }}.tgz"
            release_namespace: metallb
            create_namespace: true
            values:
                controller:
                    image:
                        pullPolicy: IfNotPresent
                speaker:
                    image:
                        pullPolicy: IfNotPresent

      - name: Проверить статус MetalLB
        ansible.builtin.command: kubectl -n metallb get deployment.apps/metallb-controller -o jsonpath='{.status.readyReplicas}'
        register: metallb_controller_status
        until: metallb_controller_status.stdout | int > 0
        retries: 10
        delay: 10

      - name: Скопировать манифест пула MetalLB
        ansible.builtin.template:
            src: mlb.j2
            dest: /etc/kubernetes/utils/mlb.yaml
            mode: "0600"
        register: mlb_pool

      - name: Применить манифест пула MetalLB
        ansible.builtin.command: kubectl -n metallb apply -f /etc/kubernetes/utils/mlb.yaml
        when: mlb_pool.changed

### Envoy Gateway (Gateway API)
- name: Envoy Gateway
  when: envoyGatewayEnable
  block:
      - name: Установить Envoy Gateway через OCI [online]
        when: k8s_install_mode == "online"
        kubernetes.core.helm:
            name: eg
            chart_ref: "oci://docker.io/envoyproxy/gateway-helm"
            chart_version: "{{ envoyGatewayVersion }}"
            release_namespace: envoy-gateway-system
            create_namespace: true
            skip_crds: false
            values:
                deployment:
                    priorityClassName: high-priority
                    replicas: "{{ envoyGatewayReplicas }}"

      - name: Установить Envoy Gateway через OCI [offline]
        when: k8s_install_mode == "offline"
        kubernetes.core.helm:
            name: eg
            chart_ref: "{{ playbook_dir }}/{{ k8s_offline_dir }}/utils/helm-charts/envoy-gateway-{{ envoyGatewayVersion }}.tgz"
            release_namespace: envoy-gateway-system
            create_namespace: true
            skip_crds: false
            values:
                deployment:
                    priorityClassName: high-priority
                    replicas: "{{ envoyGatewayReplicas }}"

      - name: Ожидание запуска Envoy Gateway
        ansible.builtin.command: kubectl -n envoy-gateway-system get deployment/envoy-gateway -o jsonpath='{.status.readyReplicas}'
        register: eg_status
        until: eg_status.stdout | int > 0
        retries: 15
        delay: 10

      - name: Скопировать манифест EnvoyProxy Config
        ansible.builtin.template:
            src: envoy-proxy-config.j2
            dest: /etc/kubernetes/utils/envoy-proxy-config.yaml
            mode: "0600"
        register: eg_proxy_config

      - name: Применить EnvoyProxy Config
        ansible.builtin.command: kubectl apply -f /etc/kubernetes/utils/envoy-proxy-config.yaml
        when: eg_proxy_config.changed

      - name: Скопировать манифест GatewayClass
        ansible.builtin.template:
            src: gateway-class.j2
            dest: /etc/kubernetes/utils/gateway-class.yaml
            mode: "0600"
        register: eg_gateway_class

      - name: Применить GatewayClass
        ansible.builtin.command: kubectl apply -f /etc/kubernetes/utils/gateway-class.yaml
        when: eg_gateway_class.changed

      - name: Скопировать манифест Gateway TLS Certificate
        ansible.builtin.template:
            src: gateway-cert.j2
            dest: /etc/kubernetes/utils/gateway-cert.yaml
            mode: "0600"
        register: eg_gateway_cert

      - name: Применить Gateway TLS Certificate
        ansible.builtin.command: kubectl apply -f /etc/kubernetes/utils/gateway-cert.yaml
        when: eg_gateway_cert.changed

      - name: Скопировать манифест Gateway
        ansible.builtin.template:
            src: gateway.j2
            dest: /etc/kubernetes/utils/gateway.yaml
            mode: "0600"
        register: eg_gateway

      - name: Применить Gateway
        ansible.builtin.command: kubectl apply -f /etc/kubernetes/utils/gateway.yaml
        when: eg_gateway.changed

### Ingress controller
- name: Ingress controller
  when: ingressControllerEnable
  block:
      - name: Добавить репозиторий ingress-nginx [online]
        when: k8s_install_mode == "online"
        kubernetes.core.helm_repository:
            name: ingress-nginx
            repo_url: https://kubernetes.github.io/ingress-nginx

      - name: Скопировать файл значений
        ansible.builtin.template:
            src: ingress-controller-values.j2
            dest: /etc/kubernetes/utils/ingress-controller-values.yaml
            mode: "0600"
        register: ingress_controller_values

      - name: Установить Helm-чарт ingress-nginx [online]
        when:
            - ingress_controller_values.changed
            - k8s_install_mode == "online"
        kubernetes.core.helm:
            name: ingress-nginx
            chart_ref: ingress-nginx/ingress-nginx
            chart_version: "{{ ingressControllerChartVersion }}"
            release_namespace: ingress-nginx
            create_namespace: true
            values_files:
                - /etc/kubernetes/utils/ingress-controller-values.yaml

      - name: Установить Helm-чарт ingress-nginx [offline]
        when:
            - ingress_controller_values.changed
            - k8s_install_mode == "offline"
        kubernetes.core.helm:
            name: ingress-nginx
            chart_ref: "{{ playbook_dir }}/{{ k8s_offline_dir }}/utils/helm-charts/ingress-nginx-{{ ingressControllerChartVersion }}.tgz"
            release_namespace: ingress-nginx
            create_namespace: true
            values_files:
                - /etc/kubernetes/utils/ingress-controller-values.yaml

