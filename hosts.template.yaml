# Шаблон инвентори для Kubernetes кластера
#
# Замените placeholder'ы на реальные значения:
#   <MASTER_IP>    — IP адрес control plane ноды
#   <WORKER_IP>    — IP адрес worker ноды
#   <HOSTNAME>     — имя хоста (FQDN или короткое)
#
# Для external etcd раскомментируйте группу etcd_nodes.
#
k8s_masters:
  hosts:
    <MASTER1_HOSTNAME>:
      ansible_host: <MASTER1_IP>
    # <MASTER2_HOSTNAME>:
    #   ansible_host: <MASTER2_IP>
    # <MASTER3_HOSTNAME>:
    #   ansible_host: <MASTER3_IP>

k8s_workers:
  hosts:
    <WORKER1_HOSTNAME>:
      ansible_host: <WORKER1_IP>
    # <WORKER2_HOSTNAME>:
    #   ansible_host: <WORKER2_IP>

k8s_cluster:
  children:
    k8s_masters:
    k8s_workers:

# External etcd nodes (раскомментировать при etcd_mode: external)
# etcd_nodes:
#   hosts:
#     <ETCD1_HOSTNAME>:
#       ansible_host: <ETCD1_IP>
#       etcd_short_name: <ETCD1_SHORT>
#     <ETCD2_HOSTNAME>:
#       ansible_host: <ETCD2_IP>
#       etcd_short_name: <ETCD2_SHORT>
#     <ETCD3_HOSTNAME>:
#       ansible_host: <ETCD3_IP>
#       etcd_short_name: <ETCD3_SHORT>
